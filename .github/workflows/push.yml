name: Push

on: push

jobs:
  test:
    name: Lint, build, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: cargo-bins/cargo-binstall@main
      - name: Install wasm-bindgen-cli matching Cargo.lock
        run: |
          VERSION=$(grep -A1 '^name = "wasm-bindgen"$' crate/Cargo.lock | grep -oP 'version = "\K[^"]+' | head -1)
          echo "Installing wasm-bindgen-cli@$VERSION"
          cargo binstall wasm-bindgen-cli@$VERSION --no-confirm
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:pack

  publish:
    name: Publish to npm
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: cargo-bins/cargo-binstall@main
      - name: Install wasm-bindgen-cli matching Cargo.lock
        run: |
          VERSION=$(grep -A1 '^name = "wasm-bindgen"$' crate/Cargo.lock | grep -oP 'version = "\K[^"]+' | head -1)
          echo "Installing wasm-bindgen-cli@$VERSION"
          cargo binstall wasm-bindgen-cli@$VERSION --no-confirm
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: npm publish --access public
